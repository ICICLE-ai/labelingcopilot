[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: long-running tests (deselect with '-m "not slow"')
    fast: quick smoke tests
    unit: pure unit tests
    integration: tests that touch multiple modules end-to-end
    gpu: requires a CUDA device

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
